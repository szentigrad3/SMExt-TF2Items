name: Build Workflow

on:
  push:
    branches:
      - main

jobs:
  create_release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - run: echo "GITHUB_SHA_SHORT=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: r${{ github.run_number }}
          release_name: Build ${{ env.GITHUB_SHA_SHORT }}
          draft: false
          prerelease: true

  build:
    needs: create_release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest]
        target_arch: [x86, x86_64]
        include:
          - meta_branch: "1.12-dev"
            sm_branch: "1.12-dev"

    steps:
      - uses: actions/checkout@v4
        with:
          path: src

      - uses: actions/checkout@v4
        with:
          repository: alliedmodders/sourcemod
          ref: ${{ matrix.sm_branch }}
          path: sourcemod
          submodules: recursive

      - uses: actions/checkout@v4
        with:
          repository: alliedmodders/metamod-source
          ref: ${{ matrix.meta_branch }}
          path: mmsource

      - uses: actions/checkout@v4
        with:
          repository: alliedmodders/hl2sdk-manifests
          path: hl2sdk-manifests

      - run: git clone https://github.com/alliedmodders/hl2sdk -b tf2 hl2sdk-tf2

      - uses: actions/setup-python@v4

      - run: pip install git+https://github.com/alliedmodders/ambuild

      # ✅ FIXED spcomp (Linux)
      - name: Setup spcomp (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L https://sm.alliedmods.net/smdrop/1.12/sourcemod-latest-linux.tar.gz -o sm.tar.gz
          tar -xzf sm.tar.gz
          chmod +x addons/sourcemod/scripting/spcomp
          echo "$(pwd)/addons/sourcemod/scripting" >> $GITHUB_PATH

      # ✅ keep Windows normal
      - name: Setup spcomp (Windows)
        if: runner.os == 'Windows'
        uses: rumblefrog/setup-sp@v1.2.2

      - run: |
          printf '"Games"\n{\n}\n' > src/tf2.items.nosoop.txt
          printf '"TF2Items"\n{\n}\n' > src/tf2.items.txt

      - run: sed -i '/#define REQUIRE_EXTENSIONS/d' src/pawn/tf2items_manager.sp || true

      - working-directory: src
        run: |
          mkdir build && cd build
          python3 ../configure.py \
            --sdks=tf2 \
            --sm-path="${{ github.workspace }}/sourcemod" \
            --mms-path="${{ github.workspace }}/mmsource" \
            --hl2sdk-manifest-path="${{ github.workspace }}/hl2sdk-manifests" \
            --targets ${{ matrix.target_arch }}
          ambuild
